<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do List App</title>
</head>

<body>
    <div class="container">
        <div class="mode">
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider round"></span>
            </label>
        </div>
        <div class="col">
            <div class="todo-app">
                <h2>To-Do List</h2>
                <div class="row-todo">
                    <input type="text" id="input-list" placeholder="Add your text">
                    <!-- <input type="datetime-local" id="due-date">/ -->
                    <button id="addBtn" onclick="addTask()">Add</button>
                </div>
                <ul id="list-container">
                </ul>
            </div>
            <div class="notes-app">
                <div class="row-notes">
                    <h2>Notes</h2>
                    <button class="createBtn">Create</button>
                </div>
                <div class="notes-container">
                    <!-- <div class="note">
                        <p contenteditable></p>
                        <span>×</span>
                    </div> -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
